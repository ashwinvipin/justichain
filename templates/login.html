<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JustiChain AI — Login</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>

  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg,#e8e6f5,#e4eef8);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: #fff;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      width: 300px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #5b21c9;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #7c3aed;
    }

    h2 {
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>JustiChain AI</h2>

  <!-- 🔥 IMPORTANT FORM -->
  <form method="POST">
    
    <input 
      type="text" 
      name="username" 
      placeholder="Username" 
      required
    />

    <input 
      type="password" 
      name="password" 
      placeholder="Password" 
      required
    />

    <button type="submit">🔐 Login</button>

  </form>

</div>

</body>
</html>
